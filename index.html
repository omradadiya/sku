<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saree Inventory Cloud Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #222; --bg: #f9f9f9; --card: #ffffff; --text: #222; 
            --accent: #007bff; --danger: #ff4757; --border: #eee; --success: #28a745;
        }
        [data-theme="dark"] {
            --primary: #f9f9f9; --bg: #121212; --card: #1e1e1e; --text: #ffffff; 
            --accent: #379aff; --danger: #ff5e6c; --border: #333;
        }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .theme-switch-wrapper { position: absolute; top: 15px; right: 20px; z-index: 1001; }
        .theme-btn { background: var(--card); border: 1px solid var(--border); padding: 8px; border-radius: 50%; cursor: pointer; font-size: 18px; }

        .page { display: none; width: 100%; max-width: 450px; padding: 20px; animation: fadeIn 0.2s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { font-weight: 500; font-size: 22px; text-align: center; margin: 20px 0; }
        .stats { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; border: 1px solid var(--border); }
        .stats b { font-size: 26px; color: var(--accent); }
        .main-search { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); margin-bottom: 20px; }
        
        .menu-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; }
        .menu-btn { background: var(--card); border: 1px solid var(--border); padding: 15px 5px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 12px; color: var(--text); }
        
        .back-link { color: var(--accent); cursor: pointer; display: block; margin-bottom: 20px; font-size: 14px; }
        input[type="text"] { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); }
        
        /* File Upload UI */
        .file-upload-wrapper { width: 100%; position: relative; margin-bottom: 20px; }
        .file-upload-box { width: 100%; height: 120px; border: 2px dashed var(--accent); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--card); color: var(--accent); }
        .file-upload-box.has-file { border-color: var(--success); color: var(--success); }
        #imageInput { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }

        .btn { width: 100%; padding: 14px; background: var(--primary); color: var(--bg); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-pdf { background: var(--success); color: white; margin-bottom: 15px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-item { background: var(--card); border: 1px solid var(--border); padding: 8px; border-radius: 12px; text-align: center; position: relative; }
        .grid-item img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; }
        .grid-item p { font-size: 13px; margin: 8px 0; font-weight: bold; }
        
        .item-checkbox { position: absolute; top: 10px; left: 10px; width: 22px; height: 22px; z-index: 5; }
        .action-links { display: flex; gap: 5px; margin-top: 5px; }
        .edit-btn { flex: 1; background: var(--accent); color: white; border: none; padding: 6px; border-radius: 6px; font-size: 11px; }
        .del-btn { flex: 1; background: var(--danger); color: white; border: none; padding: 6px; border-radius: 6px; font-size: 11px; }

        /* Modals */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; }
        .custom-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); color: var(--text); padding: 25px; border-radius: 20px; z-index: 1000; text-align: center; width: 85%; max-width: 320px; }
        
        #loading { display: none; position: fixed; top: 10px; background: var(--accent); color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; z-index: 2000; }

        @media print {
            .no-print, .theme-switch-wrapper, .back-link, .action-links, .item-checkbox, .btn, .theme-btn { display: none !important; }
            .page { display: block !important; max-width: 100% !important; }
            .grid { grid-template-columns: 1fr 1fr 1fr !important; }
        }
    </style>
</head>
<body>

    <div id="loading">Syncing...</div>

    <div class="theme-switch-wrapper no-print">
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="overlay" id="overlay" onclick="closeAllModals()"></div>

    <div id="successModal" class="custom-modal">
        <div style="font-size: 40px; color: var(--success);">✓</div>
        <p style="font-weight: bold;" id="successMsg">Success!</p>
    </div>

    <div id="editModal" class="custom-modal">
        <h3>Edit SKU ID</h3>
        <p id="oldSkuLabel" style="font-size: 12px; opacity: 0.7;"></p>
        <input type="text" id="editSkuInput">
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="background: #eee; color: #333;" onclick="closeAllModals()">Cancel</button>
            <button class="btn" onclick="saveEditedSku()">Update</button>
        </div>
    </div>

    <div id="deleteModal" class="custom-modal">
        <h3 style="color: var(--danger);">Delete?</h3>
        <p>This will be removed from all devices.</p>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn" style="background: #eee; color: #333;" onclick="closeAllModals()">No</button>
            <button class="btn" style="background: var(--danger);" id="confirmDelBtn">Yes, Delete</button>
        </div>
    </div>

    <div id="homePage" class="page active-page">
        <h2>Cloud Inventory</h2>
        <div class="stats"><b id="totalCount">0</b><p>Total Items Syncing</p></div>
        <input type="text" id="mainSearchInput" class="main-search no-print" placeholder="🔍 Search SKU..." oninput="liveSearch()">
        <div id="quickResult"></div>
        <div class="menu-row no-print">
            <div class="menu-btn" onclick="showPage('addPage')">➕<br>Add New</div>
            <div class="menu-btn" onclick="showPage('viewPage')">📦<br>Inventory</div>
            <div class="menu-btn" onclick="showPage('settingsPage')">⚙️<br>Settings</div>
        </div>
    </div>

    <div id="addPage" class="page">
        <span class="back-link" onclick="showPage('homePage')">← Back</span>
        <h2>Add New Saree</h2>
        <input type="text" id="skuInput" placeholder="Enter SKU ID">
        <div class="file-upload-wrapper">
            <div class="file-upload-box" id="dropBox">
                <span id="fileNameDisplay">📷 Tap to Select Photo</span>
                <input type="file" id="imageInput" accept="image/*" onchange="updateFileName()">
            </div>
        </div>
        <button class="btn" id="saveBtn" onclick="saveData()">Save to Cloud</button>
    </div>

    <div id="viewPage" class="page">
        <span class="back-link no-print" onclick="showPage('homePage')">← Back</span>
        <h2>Live Stock</h2>
        <button class="btn btn-pdf no-print" onclick="window.print()">📥 Download PDF Report</button>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;" class="no-print">
            <button class="btn" style="background: #eee; color: #333; padding: 10px;" onclick="toggleSelectAll()" id="selAllBtn">Select All</button>
            <button class="btn" style="background: var(--danger); padding: 10px;" onclick="bulkDeleteConfirm()">Delete Selected</button>
        </div>
        <div id="allList" class="grid"></div>
    </div>

    <div id="settingsPage" class="page">
        <span class="back-link" onclick="showPage('homePage')">← Back</span>
        <h2>System</h2>
        <p style="text-align: center; font-size: 13px; opacity: 0.6;">Connected to Firebase Cloud</p>
        <button class="btn" style="background: var(--danger);" onclick="localStorage.clear(); location.reload();">Reset App Cache</button>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyBk9p0rMNCvItvW3Hrmo8Uywtz_EZa0Yns",
            authDomain: "my-inventory-e25ca.firebaseapp.com",
            databaseURL: "https://my-inventory-e25ca-default-rtdb.firebaseio.com",
            projectId: "my-inventory-e25ca",
            storageBucket: "my-inventory-e25ca.firebasestorage.app",
            messagingSenderId: "267785565793",
            appId: "1:267785565793:web:ec98d0160528792fd61c20"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("inventory");

        let inventoryData = {};
        let currentActionKey = "";
        let isAllSelected = false;

        // --- Realtime Sync ---
        db.on('value', (snapshot) => {
            inventoryData = snapshot.val() || {};
            updateCounter();
            if (document.getElementById('viewPage').classList.contains('active-page')) renderAll();
            liveSearch();
            document.getElementById('loading').style.display = 'none';
        });

        function showLoading() { document.getElementById('loading').style.display = 'block'; }

        function updateCounter() {
            document.getElementById('totalCount').innerText = Object.keys(inventoryData).length;
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('inventory-theme', target);
            document.getElementById('themeBtn').innerText = target === 'dark' ? '☀️' : '🌙';
        }
        if(localStorage.getItem('inventory-theme') === 'dark') toggleTheme();

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            if(pageId === 'viewPage') renderAll();
        }

        function updateFileName() {
            const f = document.getElementById('imageInput').files[0];
            document.getElementById('fileNameDisplay').innerText = f ? "✅ " + f.name : "📷 Tap to Select Photo";
            document.getElementById('dropBox').classList.toggle('has-file', !!f);
        }

        function saveData() {
            const sku = document.getElementById('skuInput').value.trim().toUpperCase();
            const file = document.getElementById('imageInput').files[0];
            if (!sku || !file) return alert("Missing SKU or Photo");

            showLoading();
            const reader = new FileReader();
            reader.onload = (e) => {
                db.child(sku).set(e.target.result).then(() => {
                    document.getElementById('skuInput').value = "";
                    document.getElementById('imageInput').value = "";
                    updateFileName();
                    showSuccess("Saved to Cloud!");
                });
            };
            reader.readAsDataURL(file);
        }

        function renderAll() {
            const list = document.getElementById('allList');
            list.innerHTML = "";
            Object.keys(inventoryData).sort().forEach(sku => {
                list.innerHTML += `<div class="grid-item">
                    <input type="checkbox" class="item-checkbox no-print" data-sku="${sku}">
                    <img src="${inventoryData[sku]}"><p>${sku}</p>
                    <div class="action-links no-print">
                        <button class="edit-btn" onclick="openEditModal('${sku}')">Edit</button>
                        <button class="del-btn" onclick="deleteItem('${sku}')">Delete</button>
                    </div></div>`;
            });
        }

        function liveSearch() {
            const q = document.getElementById('mainSearchInput').value.trim().toUpperCase();
            const res = document.getElementById('quickResult');
            if (!q || !inventoryData[q]) { res.innerHTML = ""; return; }
            res.innerHTML = `<div class="grid-item" style="width:100%; max-width:200px; margin: 0 auto 20px auto;">
                <img src="${inventoryData[q]}"><p>${q}</p>
                <div class="action-links no-print">
                    <button class="edit-btn" onclick="openEditModal('${q}')">Edit</button>
                    <button class="del-btn" onclick="deleteItem('${q}')">Delete</button>
                </div></div>`;
        }

        function openEditModal(sku) {
            currentActionKey = sku;
            document.getElementById('oldSkuLabel').innerText = "Changing SKU: " + sku;
            document.getElementById('editSkuInput').value = sku;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('editModal').style.display = 'block';
        }

        function saveEditedSku() {
            const newSku = document.getElementById('editSkuInput').value.trim().toUpperCase();
            if (!newSku || newSku === currentActionKey) return closeAllModals();
            showLoading();
            const data = inventoryData[currentActionKey];
            db.child(newSku).set(data).then(() => {
                db.child(currentActionKey).remove();
                closeAllModals();
                showSuccess("SKU Updated!");
            });
        }

        function deleteItem(sku) {
            currentActionKey = sku;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('deleteModal').style.display = 'block';
            document.getElementById('confirmDelBtn').onclick = () => {
                showLoading();
                db.child(sku).remove().then(() => {
                    closeAllModals();
                    showSuccess("Deleted!");
                });
            };
        }

        function bulkDeleteConfirm() {
            const selected = Array.from(document.querySelectorAll('.item-checkbox:checked')).map(cb => cb.dataset.sku);
            if (selected.length === 0) return;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('deleteModal').style.display = 'block';
            document.getElementById('confirmDelBtn').onclick = () => {
                showLoading();
                const updates = {};
                selected.forEach(sku => updates[sku] = null);
                db.update(updates).then(() => {
                    closeAllModals();
                    showSuccess("Bulk Delete Done!");
                });
            };
        }

        function toggleSelectAll() {
            isAllSelected = !isAllSelected;
            document.querySelectorAll('.item-checkbox').forEach(cb => cb.checked = isAllSelected);
            document.getElementById('selAllBtn').innerText = isAllSelected ? "Unselect All" : "Select All";
        }

        function closeAllModals() {
            document.getElementById('overlay').style.display = 'none';
            document.querySelectorAll('.custom-modal').forEach(m => m.style.display = 'none');
        }

        function showSuccess(msg) {
            document.getElementById('successMsg').innerText = msg;
            document.getElementById('successModal').style.display = 'block';
            setTimeout(closeAllModals, 2000);
        }
    </script>
</body>
</html>
