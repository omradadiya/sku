<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saree Inventory Pro</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --success: #00b894;
            --danger: #ff7675;
            --info: #0984e3;
            --dark: #2d3436;
            --bg: #f0f2f5;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            width: 100%;
            max-width: 500px; 
            background: #fff; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h2 { text-align: center; color: var(--dark); margin-bottom: 20px; border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }

        .section-label { font-weight: bold; font-size: 13px; color: #636e72; margin-top: 15px; display: block; text-transform: uppercase; }

        input[type="text"], input[type="file"] { 
            width: 100%; padding: 12px; margin: 8px 0 12px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; 
        }

        button { 
            width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; border: none; cursor: pointer; font-size: 16px; font-weight: bold; color: white; transition: 0.3s;
        }

        .save-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .search-btn { background: linear-gradient(135deg, var(--success), #55efc4); }
        .view-all-btn { background: linear-gradient(135deg, var(--info), #74b9ff); margin-top: 20px; }
        .backup-btn { background: var(--dark); margin-top: 10px; font-size: 14px; }
        .delete-btn { background: var(--danger); display: none; margin-top: 15px; }

        #displayArea { margin-top: 25px; text-align: center; }
        #displayArea img { width: 100%; border-radius: 12px; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* Responsive Gallery Grid */
        .all-products-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            width: 100%; 
            max-width: 900px; 
            margin-top: 20px; 
        }

        @media (min-width: 600px) { .all-products-grid { grid-template-columns: repeat(3, 1fr); } }

        .product-card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; }
        .product-card p { font-weight: bold; margin: 8px 0 0 0; color: var(--dark); font-size: 14px; }

        hr { border: 0; height: 1px; background: #eee; margin: 25px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>👗 Saree Inventory</h2>
    
    <span class="section-label">Add New Product</span>
    <input type="text" id="skuInput" placeholder="Enter SKU ID (e.g. S-101)">
    <input type="file" id="imageInput" accept="image/*"> 
    <button class="save-btn" onclick="saveSaree()">SAVE PRODUCT +</button>

    <hr>

    <span class="section-label">Search & Manage</span>
    <input type="text" id="searchInput" placeholder="Enter SKU to Search...">
    <button class="search-btn" onclick="searchSaree()">SEARCH NOW 🔍</button>
    <div id="displayArea"></div>
    <button id="deleteBtn" class="delete-btn" onclick="deleteSaree()">DELETE THIS SKU 🗑️</button>

    <button class="view-all-btn" onclick="viewAllProducts()">SHOW ALL PRODUCTS 📦</button>
    
    <hr>
    
    <button class="backup-btn" onclick="downloadBackup()">DOWNLOAD BACKUP 📥</button>
    <input type="file" id="restoreInput" style="display:none" onchange="restoreBackup(event)">
    <button class="backup-btn" style="background:#636e72;" onclick="document.getElementById('restoreInput').click()">RESTORE BACKUP 📤</button>
</div>

<div id="allProductsGrid" class="all-products-grid"></div>

<script>
    const DB_PREFIX = "SAREE_APP_";

    function saveSaree() {
        const sku = document.getElementById('skuInput').value.trim().toUpperCase();
        const file = document.getElementById('imageInput').files[0];
        if (!sku || !file) { alert("Please enter SKU and select Photo!"); return; }

        const reader = new FileReader();
        reader.onload = (e) => {
            localStorage.setItem(DB_PREFIX + sku, e.target.result);
            alert("Product Saved Successfully!");
            location.reload();
        };
        reader.readAsDataURL(file);
    }

    function searchSaree() {
        const sku = document.getElementById('searchInput').value.trim().toUpperCase();
        const imageData = localStorage.getItem(DB_PREFIX + sku);
        const displayArea = document.getElementById('displayArea');
        const deleteBtn = document.getElementById('deleteBtn');
        document.getElementById('allProductsGrid').innerHTML = "";

        if (imageData) {
            displayArea.innerHTML = `
                <div style="background:var(--dark); color:white; padding:5px 15px; border-radius:20px; display:inline-block;">SKU: ${sku}</div>
                <br><img src="${imageData}">
            `;
            deleteBtn.style.display = "block";
        } else {
            displayArea.innerHTML = `<p style="color:var(--danger); font-weight:bold;">❌ SKU Not Found!</p>`;
            deleteBtn.style.display = "none";
        }
    }

    function viewAllProducts() {
        const grid = document.getElementById('allProductsGrid');
        grid.innerHTML = "";
        document.getElementById('displayArea').innerHTML = "";
        document.getElementById('deleteBtn').style.display = "none";
        
        let found = false;
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith(DB_PREFIX)) {
                found = true;
                const sku = key.replace(DB_PREFIX, "");
                const img = localStorage.getItem(key);
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `<img src="${img}"><p>${sku}</p>`;
                grid.appendChild(card);
            }
        }
        if (!found) alert("No products found in inventory.");
    }

    function deleteSaree() {
        const sku = document.getElementById('searchInput').value.trim().toUpperCase();
        if (confirm("Delete SKU " + sku + "?")) {
            localStorage.removeItem(DB_PREFIX + sku);
            location.reload();
        }
    }

    function downloadBackup() {
        let backup = {};
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith(DB_PREFIX)) backup[key] = localStorage.getItem(key);
        }
        const blob = new Blob([JSON.stringify(backup)], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "inventory_backup.json";
        a.click();
    }

    function restoreBackup(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = JSON.parse(e.target.result);
            Object.keys(data).forEach(key => localStorage.setItem(key, data[key]));
            alert("Backup Restored!");
            location.reload();
        };
        reader.readAsText(file);
    }
</script>

</body>
</html>
