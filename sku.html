<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Responsive Saree Inventory</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --success: #00b894;
            --danger: #ff7675;
            --dark: #2d3436;
            --light-bg: #f8f9fa;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 10px; /* Reduced padding for mobile */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Responsive Container */
        .container { 
            width: 100%;
            max-width: 500px; 
            background: #fff; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        h2 { text-align: center; color: var(--dark); font-size: 1.5rem; margin-bottom: 20px; border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }

        .section-label { font-weight: bold; font-size: 0.85rem; color: #636e72; margin-top: 15px; display: block; text-transform: uppercase; }

        /* Responsive Form Elements */
        input[type="text"], input[type="file"] { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0 12px 0; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            font-size: 16px; /* Prevents auto-zoom on iPhone */
        }

        button { 
            width: 100%; 
            padding: 14px; 
            margin-top: 8px;
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-size: 1rem;
            font-weight: bold; 
            color: white;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.8; }

        .save-btn { background: var(--primary); }
        .search-btn { background: var(--success); }
        .view-all-btn { background: var(--info-color, #0984e3); margin-top: 15px; }
        .backup-btn { background: var(--dark); margin-top: 10px; font-size: 0.8rem; padding: 10px; }
        .delete-btn { background: var(--danger); display: none; }

        /* Search Result Area */
        #displayArea { margin-top: 20px; text-align: center; }
        #displayArea img { width: 100%; border-radius: 10px; margin-top: 10px; }

        /* RESPONSIVE GRID FOR VIEW ALL */
        .all-products-grid { 
            display: grid; 
            width: 100%;
            max-width: 1000px;
            /* Mobile: 2 columns | Tablet/Desktop: 3-5 columns */
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            padding-bottom: 50px;
        }

        @media (min-width: 600px) {
            .all-products-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (min-width: 900px) {
            .all-products-grid { grid-template-columns: repeat(5, 1fr); }
        }

        .product-card { 
            background: white; 
            padding: 8px; 
            border-radius: 10px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
            text-align: center; 
        }

        .product-card img { 
            width: 100%; 
            aspect-ratio: 1 / 1; /* Keeps images square and uniform */
            object-fit: cover; 
            border-radius: 6px; 
        }

        .product-card p { font-weight: bold; margin: 8px 0 0 0; font-size: 0.9rem; color: var(--dark); }

        hr { border: 0; height: 1px; background: #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>👗 Inventory Manager</h2>
    
    <span class="section-label">Add New Item</span>
    <input type="text" id="skuInput" placeholder="Enter SKU ID">
    <input type="file" id="imageInput" accept="image/*" capture="environment">
    <button class="save-btn" onclick="saveSaree()">SAVE ITEM +</button>

    <hr>

    <span class="section-label">Quick Search</span>
    <input type="text" id="searchInput" placeholder="Search SKU...">
    <button class="search-btn" onclick="searchSaree()">SEARCH 🔍</button>
    <div id="displayArea"></div>
    <button id="deleteBtn" class="delete-btn" onclick="deleteSaree()">DELETE ITEM 🗑️</button>

    <button class="view-all-btn" onclick="viewAllProducts()">VIEW ALL COLLECTION 📦</button>
    
    <hr>
    
    <button class="backup-btn" onclick="downloadBackup()">DOWNLOAD BACKUP 📥</button>
    <input type="file" id="restoreInput" style="display:none" onchange="restoreBackup(event)">
    <button class="backup-btn" style="background:#636e72;" onclick="document.getElementById('restoreInput').click()">RESTORE BACKUP 📤</button>
</div>

<div id="allProductsGrid" class="all-products-grid"></div>

<script>
    // Functions (Save, Search, View, Delete, Backup) are exactly the same as before
    function saveSaree() {
        const sku = document.getElementById('skuInput').value.trim().toUpperCase();
        const file = document.getElementById('imageInput').files[0];
        if (!sku || !file) { alert("Please provide SKU and Photo"); return; }
        const reader = new FileReader();
        reader.onload = (e) => {
            localStorage.setItem("SA_INV_" + sku, e.target.result);
            alert("Saved!");
            location.reload();
        };
        reader.readAsDataURL(file);
    }

    function searchSaree() {
        const sku = document.getElementById('searchInput').value.trim().toUpperCase();
        const imageData = localStorage.getItem("SA_INV_" + sku);
        const displayArea = document.getElementById('displayArea');
        const deleteBtn = document.getElementById('deleteBtn');
        document.getElementById('allProductsGrid').innerHTML = "";

        if (imageData) {
            displayArea.innerHTML = `<div style="background:var(--dark); color:white; padding:4px 12px; border-radius:15px; display:inline-block; font-size:14px;">SKU: ${sku}</div><br><img src="${imageData}">`;
            deleteBtn.style.display = "block";
        } else {
            displayArea.innerHTML = `<p style="color:var(--danger);">Not Found!</p>`;
            deleteBtn.style.display = "none";
        }
    }

    function viewAllProducts() {
        const grid = document.getElementById('allProductsGrid');
        grid.innerHTML = "";
        document.getElementById('displayArea').innerHTML = "";
        document.getElementById('deleteBtn').style.display = "none";
        let itemsFound = false;
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith("SA_INV_")) {
                itemsFound = true;
                const sku = key.replace("SA_INV_", "");
                const img = localStorage.getItem(key);
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `<img src="${img}"><p>${sku}</p>`;
                grid.appendChild(card);
            }
        }
        if(!itemsFound) alert("Inventory is empty!");
    }

    function deleteSaree() {
        const sku = document.getElementById('searchInput').value.trim().toUpperCase();
        if (confirm("Delete SKU " + sku + "?")) {
            localStorage.removeItem("SA_INV_" + sku);
            location.reload();
        }
    }

    function downloadBackup() {
        let backupData = {};
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith("SA_INV_")) backupData[key] = localStorage.getItem(key);
        }
        const blob = new Blob([JSON.stringify(backupData)], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "inventory_backup.json";
        a.click();
    }

    function restoreBackup(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = JSON.parse(e.target.result);
            Object.keys(data).forEach(key => localStorage.setItem(key, data[key]));
            alert("Backup Restored!");
            location.reload();
        };
        reader.readAsText(file);
    }
</script>

</body>
</html>
